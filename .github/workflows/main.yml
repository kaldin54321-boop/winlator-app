name: Android CI Bionic

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone linkernsbypass
      run: |
        mkdir -p app/src/main/cpp/adrenotools/lib
        git clone https://github.com/Pipetto-crypto/liblinkernsbypass.git app/src/main/cpp/adrenotools/lib/linkernsbypass

    - name: Verify CMake subdirectories
      run: |
        for dir in winlator vortekrenderer virglrenderer midihandler libadrenotools gladiorenderer; do
        if [ ! -d "app/src/main/cpp/$dir" ] || [ ! -f "app/src/main/cpp/$dir/CMakeLists.txt" ]; then
        echo "ERROR: Missing directory or CMakeLists.txt for $dir"
        exit 1
        fi
        done

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Shader Compiler
      run: sudo apt-get update && sudo apt-get install -y glslang-tools

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b
        add-to-path: true

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace --info

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
